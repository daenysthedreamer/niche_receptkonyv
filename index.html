<!DOCTYPE html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Receptkönyv</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      // Regisztráció kezelése
      const regBtn = document.querySelector(
        "#registerModal .modal-footer button",
      );
      regBtn.addEventListener("click", function () {
        const inputs = document.querySelectorAll("#registerModal input");
        const data = {
          user: inputs[0].value,
          email: inputs[1].value,
          pass: inputs[2].value,
        };

        if (data.user && data.email && data.pass) {
          alert(`Sikeres regisztráció, üdvözlünk ${data.user}!`);
          bootstrap.Modal.getInstance(
            document.getElementById("registerModal"),
          ).hide();
          // Itt ürítjük a mezőket
          inputs.forEach((i) => (i.value = ""));
        } else {
          alert("Kérlek, tölts ki minden mezőt!");
        }
      });

      // Bejelentkezés kezelése
      const loginBtn = document.querySelector(
        "#loginModal .modal-footer button",
      );
      loginBtn.addEventListener("click", function () {
        const inputs = document.querySelectorAll("#loginModal input");
        const user = inputs[0].value;
        const pass = inputs[1].value;

        if (user && pass) {
          // "Életszerű" visszajelzés: gomb kicserélése a fejlécben
          alert(`Szia ${user}, sikeresen beléptél!`);
          bootstrap.Modal.getInstance(
            document.getElementById("loginModal"),
          ).hide();

          // Lecseréljük a Regisztráció/Belépés gombokat a profil nevére
          const buttonContainer = document.querySelector(
            ".adat.d-flex.flex-md-row .gap-2",
          );
          buttonContainer.innerHTML = `<span class="fw-bold text-white">👤 ${user}</span>
                                       <button class="btn btn-outline-light btn-sm ms-2" onclick="location.reload()">Kijelentkezés</button>`;
        } else {
          alert("Hibás felhasználónév vagy jelszó!");
        }
      });
    });
  </script>
  <body class="mt-0">
    <div
      class="adat d-flex flex-column flex-md-row align-items-center justify-content-between min-vw-100 p-2 mb-4"
    >
      <div class="d-flex align-items-center gap-2 mb-2 mb-md-0">
        <img src="kenyéricon.png" alt="" height="50" />
        <span class="fs-4">Receptkönyv</span>
      </div>

      <div class="d-flex gap-2">
        <button
          class="btn btn-primary fs-5 gomb px-3"
          data-bs-toggle="modal"
          data-bs-target="#registerModal"
        >
          Regisztráció
        </button>
        <button
          class="btn btn-primary fs-5 gomb px-3"
          data-bs-toggle="modal"
          data-bs-target="#loginModal"
        >
          Bejelentkezés
        </button>
      </div>
    </div>

    <div class="container shadow szin px-2 py-1">
      <div class="row p-3 mb-3">
        <div class="adat col shadow rounded-3 p-3">
          <center>
            <p id="etelNeve">Lorem, ipsum.</p>
          </center>
        </div>
      </div>

      <div class="row p-3 g-4">
        <div class="col-6">
          <table>
            <tbody>
              <tr>
                <td class="adat shadow rounded-3 mx-1">Liszt</td>
                <td class="adat shadow rounded-3 mx-1">300g</td>
                <td class="shadow rounded-3 mx-1">
                  <button class="btn btn-danger">🗑️</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        <div class="adat col-6 shadow rounded-3 p-3">
          <p id="etelLeiras" class="py-3 text-justify">
            Lorem ipsum dolor sit amet consectetur adipisicing elit...
          </p>
        </div>

        <div class="row p-3 g-4">
          <div class="col">
            <center>
              <button class="btn btn-primary fs-3 fw-bold gomb">➕</button>
            </center>
          </div>
          <div class="col">
            <center>
              <button class="btn btn-primary fs-3 gomb px-3">Mentés</button>
            </center>
          </div>
        </div>
      </div>

      <div class="m-3 p-2 adat rounded-3">
        <div class="p-2">
          <div class="col gomb p-2 rounded-3 text-center w-100">
            Lorem ipsum, dolor sit amet consectetur adipisicing elit.
          </div>
          <button class="btn btn-primary fs-4 gomb px-4 mt-3">Új recept</button>
        </div>
      </div>
    </div>

    <div class="modal fade" id="registerModal">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Regisztráció</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>

          <div class="modal-body">
            <input
              type="text"
              class="form-control mb-2"
              placeholder="Felhasználónév"
            />
            <input type="email" class="form-control mb-2" placeholder="Email" />
            <input
              type="password"
              class="form-control mb-2"
              placeholder="Jelszó"
            />
          </div>

          <div class="modal-footer">
            <button class="btn btn-primary fs-4 gomb px-4 mt-3">
              Regisztráció
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="loginModal">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Bejelentkezés</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>

          <div class="modal-body">
            <input
              type="text"
              class="form-control mb-2"
              placeholder="Felhasználónév"
            />
            <input
              type="password"
              class="form-control mb-2"
              placeholder="Jelszó"
            />
          </div>

          <div class="modal-footer">
            <button class="btn btn-primary fs-4 gomb px-4 mt-3">Belépés</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
