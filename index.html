<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receptkönyv</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="mt-0">
    <div class="adat d-flex flex-column flex-md-row align-items-center justify-content-between min-vw-100 p-2 mb-4">

        <div class="d-flex align-items-center gap-2 mb-2 mb-md-0">
            <img src="kenyéricon.png" alt="" height="50">
            <span class="fs-4">Receptkönyv</span>
        </div>

        <div class="d-flex gap-2">
            <button class="btn btn-primary fs-5 gomb px-3">Regisztráció</button>
            <button class="btn btn-primary fs-5 gomb px-3">Bejelentkezés</button>
        </div>

    </div>

    <div class="container shadow szin px-2 py-1">
        <div class="row p-3 mb-3">
            <div class="adat col shadow rounded-3 p-3 text-center">
                <p id="etelNeve" contenteditable="true" style="color:rgb(255, 255, 255);">Étel neve</p>
            </div>
        </div>

        <div class="row p-3 g-4">
            <div class="col-6">
                <table class="w-100">
                    <tbody id="hozzavalokTabla"></tbody>
                </table>

                <button id="ujHozzavalo" class="btn btn-success mt-2">➕</button>
            </div>

            <div class="adat col-6 shadow rounded-3 p-3">
                <p id="etelLeiras" contenteditable="true" class="py-3" style="color:rgb(255, 255, 255);">
                    Leírás
                </p>
            </div>

            <div class="row p-3 g-4">
                <div class="col text-center">
                    <button id="mentesGomb" class="btn btn-primary fs-3 gomb px-3">Mentés</button>
                    <button id="ujReceptGomb" class="btn btn-primary fs-3 gomb px-3 ms-3">Új recept</button>
                </div>
            </div>
        </div>

        <div id="receptekLista" class="m-3 p-2 adat rounded-3"></div>
    </div>

    <script>
        let receptek = JSON.parse(localStorage.getItem("receptek")) || [];
        let hozzavalok = [];
        let aktivIndex = null;

        megjelenit();
        hozzavalokMegjelenit();

        function setupPlaceholder(el, text) {
            el.addEventListener("focus", () => {
                if (el.innerText === text) {
                    el.innerText = "";
                    el.style.color = "white";
                }
            });

            el.addEventListener("blur", () => {
                if (el.innerText.trim() === "") {
                    el.innerText = text;
                    el.style.color = "white";
                }
            });
        }

        setupPlaceholder(document.getElementById("etelNeve"), "Étel neve");
        setupPlaceholder(document.getElementById("etelLeiras"), "Leírás");

        document.getElementById("ujHozzavalo").addEventListener("click", function () {
            hozzavalok.push({ nev: "", mennyiseg: "" });
            hozzavalokMegjelenit();
        });

        document.getElementById("mentesGomb").addEventListener("click", function () {
            let nev = document.getElementById("etelNeve").innerText;
            let leiras = document.getElementById("etelLeiras").innerText;

            if (nev === "Étel neve") nev = "";
            if (leiras === "Leírás") leiras = "";

            const recept = {
                nev,
                leiras,
                hozzavalok
            };

            if (aktivIndex === null) {
                receptek.push(recept);
            } else {
                receptek[aktivIndex] = recept;
            }

            localStorage.setItem("receptek", JSON.stringify(receptek));

            aktivIndex = null;
            hozzavalok = [];

            document.getElementById("etelNeve").innerText = "Étel neve";
            document.getElementById("etelNeve").style.color = "white";

            document.getElementById("etelLeiras").innerText = "Leírás";
            document.getElementById("etelLeiras").style.color = "white";

            hozzavalokMegjelenit();
            megjelenit();
        });

        document.getElementById("ujReceptGomb").addEventListener("click", function () {
            aktivIndex = null;
            hozzavalok = [];

            document.getElementById("etelNeve").innerText = "Étel neve";
            document.getElementById("etelNeve").style.color = "white";

            document.getElementById("etelLeiras").innerText = "Leírás";
            document.getElementById("etelLeiras").style.color = "white";

            hozzavalokMegjelenit();
        });

        function hozzavalokMegjelenit() {
            const tabla = document.getElementById("hozzavalokTabla");
            tabla.innerHTML = "";

            hozzavalok.forEach((h, index) => {
                tabla.innerHTML += `
    <tr>
        <td>
            <input type="text" value="${h.nev}" 
            placeholder="termék"
            onchange="updateNev(${index}, this.value)"
            class="form-control"
            style="background-color: rgb(191, 113, 54); color: white; border: none;">
        </td>

        <td>
            <input type="number" value="${h.mennyiseg}" 
            placeholder="mennyiség (kg)"
            min="0"
            step="any"
            onchange="updateMenny(${index}, this.value)"
            class="form-control"
            style="background-color: rgb(191, 113, 54); color: white; border: none;">
        </td>

        <td>
            <button onclick="torolHozzavalo(${index})" 
            class="btn btn-danger">🗑️</button>
        </td>
    </tr>
`;
            });
        }

        function updateNev(index, value) {
            hozzavalok[index].nev = value;
        }

        function updateMenny(index, value) {
            hozzavalok[index].mennyiseg = value;
        }

        function torolHozzavalo(index) {
            hozzavalok.splice(index, 1);
            hozzavalokMegjelenit();
        }

        function megjelenit() {
            const lista = document.getElementById("receptekLista");
            lista.innerHTML = "";

            receptek.forEach((recept, index) => {
                lista.innerHTML += `
                    <div class="p-2 mb-2 gomb rounded-3 text-center">
                        <h4>${recept.nev}</h4>

                        <button onclick="megtekint(${index})" class="btn btn-light mt-2">
                            Megtekintés
                        </button>

                        <button onclick="torol(${index})" class="btn btn-danger mt-2">
                            Törlés
                        </button>
                    </div>
                `;
            });
        }

        function megtekint(index) {
            const r = receptek[index];

            document.getElementById("etelNeve").innerText = r.nev || "Étel neve";
            document.getElementById("etelNeve").style.color = r.nev ? "black" : "white";

            document.getElementById("etelLeiras").innerText = r.leiras || "Leírás";
            document.getElementById("etelLeiras").style.color = r.leiras ? "black" : "white";

            hozzavalok = JSON.parse(JSON.stringify(r.hozzavalok || []));
            aktivIndex = index;

            hozzavalokMegjelenit();
        }

        function torol(index) {
            receptek.splice(index, 1);
            localStorage.setItem("receptek", JSON.stringify(receptek));
            megjelenit();
        }
    </script>
</body>

</html>
